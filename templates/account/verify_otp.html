{% extends "base.html" %}
{% block content %}
<div style="max-width:500px;margin:50px auto;padding:40px;background:#1a1a2e;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.3);">
    <h2 style="text-align:center;color:#c9a84c;margin-bottom:10px;">🔐 Tasdiqlash kodi</h2>
    <p style="text-align:center;color:#ccc;margin-bottom:30px;">
        Emailingizga yuborilgan 6 xonali kodni kiriting
    </p>

    {% if error %}
    <div style="background:#ff4444;color:white;padding:12px;border-radius:8px;margin-bottom:20px;text-align:center;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:20px;">
            <label style="color:#ccc;display:block;margin-bottom:8px;">Tasdiqlash kodi</label>
            <input 
                type="text" 
                name="code" 
                maxlength="6" 
                pattern="[0-9]{6}"
                placeholder="6 xonali kodni kiriting"
                required
                autocomplete="one-time-code"
                style="width:100%;padding:14px;font-size:24px;text-align:center;letter-spacing:12px;
                       background:#0f0f23;border:2px solid #333;border-radius:8px;color:#c9a84c;
                       box-sizing:border-box;"
            >
        </div>
        <button type="submit" style="width:100%;padding:14px;background:#c9a84c;color:#1a1a2e;
                                      border:none;border-radius:8px;font-size:16px;font-weight:bold;
                                      cursor:pointer;">
            Tasdiqlash
        </button>
    </form>

    <p style="text-align:center;margin-top:20px;color:#888;font-size:14px;">
        Kod kelmadi mi? 
        <a href="{% url 'account:forgot' %}" style="color:#c9a84c;text-decoration:none;">
            Qaytadan yuborish
        </a>
    </p>
</div>
{% endblock %}
