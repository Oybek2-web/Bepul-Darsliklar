{% extends "base.html" %}
{% block content %}
<div style="max-width:500px;margin:50px auto;padding:40px;background:#1a1a2e;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.3);">
    <h2 style="text-align:center;color:#c9a84c;margin-bottom:10px;">🔑 Yangi parol o'rnating</h2>
    <p style="text-align:center;color:#ccc;margin-bottom:30px;">
        Hisobingiz uchun yangi parol kiriting
    </p>

    {% if error %}
    <div style="background:#ff4444;color:white;padding:12px;border-radius:8px;margin-bottom:20px;text-align:center;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div style="margin-bottom:20px;">
            <label style="color:#ccc;display:block;margin-bottom:8px;">Yangi parol</label>
            <input
                type="password"
                name="password1"
                placeholder="Kamida 6 ta belgi"
                required
                minlength="6"
                style="width:100%;padding:14px;font-size:16px;
                       background:#0f0f23;border:2px solid #333;border-radius:8px;color:#fff;
                       box-sizing:border-box;"
            >
        </div>

        <div style="margin-bottom:25px;">
            <label style="color:#ccc;display:block;margin-bottom:8px;">Parolni tasdiqlang</label>
            <input
                type="password"
                name="password2"
                placeholder="Parolni qaytadan kiriting"
                required
                minlength="6"
                style="width:100%;padding:14px;font-size:16px;
                       background:#0f0f23;border:2px solid #333;border-radius:8px;color:#fff;
                       box-sizing:border-box;"
            >
        </div>

        <button type="submit" style="width:100%;padding:14px;background:#c9a84c;color:#1a1a2e;
                                      border:none;border-radius:8px;font-size:16px;font-weight:bold;
                                      cursor:pointer;">
            Parolni saqlash
        </button>
    </form>

    <p style="text-align:center;margin-top:20px;color:#888;font-size:14px;">
        Parolni esladimi?
        <a href="{% url 'accounts:login' %}" style="color:#c9a84c;text-decoration:none;">
            Kirish sahifasiga qaytish
        </a>
    </p>
</div>
{% endblock %}
