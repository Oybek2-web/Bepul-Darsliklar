<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
</head>
<body>

{% extends 'main.html' %}
{% load static %}

{% block title %}
<title>Reset Password</title>
{% endblock %}

{% block content %}

<style>
    .reset-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
    }

    .box {
        width: 100%;
        max-width: 420px;
        background: #111111;
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        overflow: hidden;
    }

    .box-header {
        position: relative;
        padding: 32px 32px 28px;
        background: #161616;
        border-bottom: 1px solid rgba(201,168,76,0.12);
        overflow: hidden;
    }

    .box-header::before {
        content: '';
        position: absolute;
        top: -60px;
        right: -60px;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
        pointer-events: none;
    }

    .box-header .eyebrow {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #c9a84c;
        margin-bottom: 8px;
    }

    .box-header h2 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 36px;
        letter-spacing: 2px;
        color: #f0ece4;
        margin: 0;
        line-height: 1;
    }

    .box-body {
        padding: 28px 32px 32px;
    }

    .box-body p.hint {
        font-size: 13px;
        color: #5a5550;
        margin-bottom: 20px;
        line-height: 1.6;
    }

    .field-group {
        margin-bottom: 18px;
    }

    .field-group label {
        display: block;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #5a5550;
        margin-bottom: 8px;
    }

    .field-group input {
        width: 100%;
        padding: 12px 16px;
        background: #0a0a0a;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 6px;
        color: #f0ece4;
        font-family: 'Outfit', sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.25s;
    }

    .field-group input::placeholder {
        color: #3a3530;
    }

    .field-group input:focus {
        border-color: rgba(201,168,76,0.5);
    }

    .box-body button {
        width: 100%;
        padding: 13px;
        margin-top: 4px;
        background: #c9a84c;
        color: #0a0a0a;
        font-family: 'Outfit', sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.25s, transform 0.2s;
    }

    .box-body button:hover {
        background: #e8c96a;
        transform: translateY(-1px);
    }

    .msg {
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
    }

    .msg.success {
        background: rgba(39,174,96,0.1);
        border: 1px solid rgba(39,174,96,0.3);
        color: #2ecc71;
    }
</style>

<div class="reset-wrapper">
    <div class="box">

        <div class="box-header">
            <p class="eyebrow">Account Recovery</p>
            <h2>Reset Password</h2>
        </div>

        <div class="box-body">
            <p class="hint">Choose a strong new password for your account.</p>

            <form method="POST">
                {% csrf_token %}

                <div class="field-group">
                    <label>New Password</label>
                    <input type="password" name="password" placeholder="New password">
                </div>

                <button type="submit">Reset</button>
            </form>

            {% if success %}
                <div class="msg success">{{ success }}</div>
            {% endif %}
        </div>

    </div>
</div>

{% endblock %}

</body>
</html>
