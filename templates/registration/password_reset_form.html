<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parolni tiklash</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.3);
      --accent-light: #a99fff;
      --text: #e8e8f0;
      --text-muted: #6b6b80;
      --error: #ff6b6b;
      --success: #63ffb4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(108,99,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 20%, rgba(99,255,180,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      margin: 20px;
      box-shadow: 0 0 60px rgba(108,99,255,0.08), 0 24px 64px rgba(0,0,0,0.5);
      animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .icon-wrap {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(108,99,255,0.05));
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      font-size: 24px;
      animation: slideUp 0.6s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      animation: slideUp 0.6s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
      animation: slideUp 0.6s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .form-group {
      margin-bottom: 20px;
      animation: slideUp 0.6s 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    input[type="email"] {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-family: 'Sora', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input[type="email"]:focus {
      border-color: var(--accent);
      background: rgba(108,99,255,0.05);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input[type="email"]::placeholder { color: var(--text-muted); }

    .errorlist {
      list-style: none;
      margin-top: 8px;
    }

    .errorlist li {
      font-size: 0.8rem;
      color: var(--error);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .errorlist li::before { content: '⚠'; }

    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Sora', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
      margin-top: 8px;
      animation: slideUp 0.6s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
      position: relative;
      overflow: hidden;
    }

    button[type="submit"]::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    }

    button[type="submit"]:hover {
      background: #7c74ff;
      box-shadow: 0 6px 24px rgba(108,99,255,0.45);
      transform: translateY(-1px);
    }

    button[type="submit"]:active { transform: translateY(0); }

    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
      animation: slideUp 0.6s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .back-link:hover { color: var(--accent-light); }
    .back-link::before { content: '←'; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>

  <div class="card">
    <div class="icon-wrap">🔐</div>
    <h1>Parolni tiklash</h1>
    <p class="subtitle">
      Email manzilingizni kiriting — parolni tiklash uchun havola yuboramiz.
    </p>

    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="form-group">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <ul class="errorlist">
              {% for error in field.errors %}
                <li>{{ error }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        </div>
      {% endfor %}

      <button type="submit">Havola yuborish</button>
    </form>
  </div>
</body>
</html>
