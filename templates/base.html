<!DOCTYPE html>
<html lang="uz">

{% load static %}

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Darsliklar{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand d-flex align-items-center"
           href="{% url 'fanlar:fanlar_list' %}"
           style="gap: 10px;">

            <img src="https://i.ibb.co/DfBR13p7/logo.png"
                 style="height: 40px; width: 40px; object-fit: contain;">

            <span class="fw-bold text-white mb-0"
                  style="font-size: 1.3rem;">
                Darsliklar
            </span>
        </a>

        <!-- SEARCH -->
        <form class="d-flex ms-auto me-3"
              method="get"
              action="{% url 'fanlar:fanlar_list' %}">

            <input class="form-control me-2"
                   type="search"
                   name="search"
                   placeholder="Fan qidirish..."
                   value="{{ request.GET.search|default:'' }}">

            <button class="btn btn-outline-light" type="submit">
                Qidirish
            </button>
        </form>

        <!-- CREATE BUTTON -->
        <a href="{% url 'fanlar:fanlar_create' %}" class="shorts-btn ms-2">
            + Qo‘shish
        </a>

        <style>
            .shorts-btn{
                padding: 8px 20px;
                border-radius: 20px;
                font-weight: 600;
                color: white;
                text-decoration: none;
                background: linear-gradient(45deg, #4f46e5, #6366f1);
                transition: 0.3s;
            }

            .shorts-btn:hover{
                transform: scale(1.05);
                color: white;
            }
        </style>

    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4 flex-grow-1">
    {% block content %}
    {% endblock %}
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-auto">
    © 2026 Darsliklar platformasi
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
