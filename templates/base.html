<!DOCTYPE html>
{% load static %}
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Darsliklar{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-hover: #5659e0;

            --bg-light: #f8fafc;

            --text-dark: #0f172a;
            --text-muted: #64748b;

            --border: #e2e8f0;

            --shadow-sm:
                    0 1px 2px 0 rgb(0 0 0 / 0.05);

            --shadow-md:
                    0 10px 15px -3px rgb(0 0 0 / 0.1),
                    0 4px 6px -4px rgb(0 0 0 / 0.1);

            --radius: 14px;
            --radius-lg: 20px;
        }

        * {
            font-family: 'Inter', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* =========================
           NAVBAR
        ========================== */

        .navbar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);

            border-bottom: 1px solid var(--border);

            padding: 14px 0;

            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .navbar-brand {
            text-decoration: none;
            gap: 12px;
        }

        .navbar-brand img {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: cover;
        }

        .navbar-brand span {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* =========================
           SEARCH
        ========================== */

        .search-form {
            position: relative;
            width: 100%;
            max-width: 420px;
        }

        .search-form input {
            width: 100%;

            height: 46px;

            border-radius: 14px;

            border: 1px solid var(--border);

            background: #fff;

            padding-left: 46px;
            padding-right: 16px;

            font-size: 0.95rem;

            transition: 0.2s ease;
        }

        .search-form input:focus {
            outline: none;

            border-color: var(--primary);

            box-shadow:
                    0 0 0 4px rgb(99 102 241 / 0.12);
        }

        .search-icon {
            position: absolute;

            left: 15px;
            top: 50%;

            transform: translateY(-50%);

            color: #94a3b8;

            display: flex;
            align-items: center;
        }

        /* =========================
           BUTTONS
        ========================== */

        .btn-register {
            height: 46px;

            padding: 0 18px;

            border-radius: 14px;

            border: 1px solid var(--border);

            background: #fff;

            color: var(--text-dark);

            text-decoration: none;

            display: inline-flex;
            align-items: center;
            justify-content: center;

            font-weight: 600;

            transition: 0.2s ease;
        }

        .btn-register:hover {
            background: #f1f5f9;

            border-color: #cbd5e1;

            color: var(--primary);
        }

        .btn-create {
            height: 46px;

            padding: 0 18px;

            border-radius: 14px;

            border: none;

            background:
                    linear-gradient(
                            135deg,
                            var(--primary),
                            var(--primary-dark)
                    );

            color: #fff;

            text-decoration: none;

            display: inline-flex;
            align-items: center;
            justify-content: center;

            gap: 7px;

            font-weight: 600;

            box-shadow:
                    0 6px 16px rgb(99 102 241 / 0.28);

            transition: 0.2s ease;
        }

        .btn-create:hover {
            color: white;

            transform: translateY(-1px);

            background:
                    linear-gradient(
                            135deg,
                            var(--primary-hover),
                            var(--primary-dark)
                    );

            box-shadow:
                    0 8px 20px rgb(99 102 241 / 0.35);
        }

        /* =========================
           CONTENT
        ========================== */

        .content-card {
            background: white;

            border: 1px solid var(--border);

            border-radius: var(--radius-lg);

            padding: 24px;

            box-shadow: var(--shadow-sm);

            transition: 0.2s ease;
        }

        .content-card:hover {
            box-shadow: var(--shadow-md);
        }

        /* =========================
           FOOTER
        ========================== */

        footer {
            margin-top: auto;

            background: white;

            border-top: 1px solid var(--border);

            color: var(--text-muted);

            padding: 18px 0;

            font-size: 0.92rem;
        }

        /* =========================
           MOBILE
        ========================== */

        @media (max-width: 991px) {

            .navbar-collapse {
                padding-top: 18px;
            }

            .search-form {
                max-width: 100%;
                margin-bottom: 14px;
            }

            .navbar-buttons {
                width: 100%;
                flex-direction: column;
            }

            .btn-register,
            .btn-create {
                width: 100%;
            }
        }

    </style>
</head>

<body>

<!-- =========================
     NAVBAR
========================== -->

<nav class="navbar navbar-expand-lg">

    <div class="container">

        <!-- LOGO -->

        <a class="navbar-brand d-flex align-items-center"
           href="{% url 'fanlar:fanlar_list' %}">

            <img src="https://i.ibb.co/DfBR13p7/logo.png"
                 alt="Logo">

            <span>Darsliklar</span>

        </a>

        <!-- TOGGLER -->

        <button class="navbar-toggler border-0 shadow-none"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarContent">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- NAVBAR CONTENT -->

        <div class="collapse navbar-collapse"
             id="navbarContent">

            <!-- SEARCH -->

            <form class="search-form mx-lg-auto"
                  method="get"
                  action="{% url 'fanlar:fanlar_list' %}">

                <span class="search-icon">

                    <svg xmlns="http://www.w3.org/2000/svg"
                         width="18"
                         height="18"
                         viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor"
                         stroke-width="2"
                         stroke-linecap="round"
                         stroke-linejoin="round">

                        <circle cx="11"
                                cy="11"
                                r="8"></circle>

                        <path d="m21 21-4.3-4.3"></path>

                    </svg>

                </span>

                <input type="search"
                       name="search"
                       placeholder="Fan qidirish..."
                       value="{{ request.GET.search|default:'' }}">

            </form>

            <!-- BUTTONS -->

            <div class="d-flex align-items-center gap-2 navbar-buttons ms-lg-3">

                <!-- REGISTER -->

                <a href="{% url 'account:register' %}"
                   class="btn-register">

                    Registratsiya

                </a>

                <!-- CREATE -->

                <a href="{% url 'fanlar:fanlar_create' %}"
                   class="btn-create">

                    <svg xmlns="http://www.w3.org/2000/svg"
                         width="16"
                         height="16"
                         viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor"
                         stroke-width="2.5"
                         stroke-linecap="round"
                         stroke-linejoin="round">

                        <path d="M12 5v14M5 12h14"/>

                    </svg>

                    Qo'shish

                </a>

            </div>

        </div>

    </div>

</nav>

<!-- =========================
     MAIN
========================== -->

<main class="container mt-4 mb-4 flex-grow-1">

    {% block content %}

    <div class="content-card">

        <h4 class="fw-bold mb-3">
            Xush kelibsiz 👋
        </h4>

        <p class="text-muted mb-0">
            Bu yerda fanlar va darsliklar joylashadi.
        </p>

    </div>

    {% endblock %}

</main>

<!-- =========================
     FOOTER
========================== -->

<footer class="text-center">

    <div class="container">

        © 2026 Darsliklar platformasi.
        Barcha huquqlar himoyalangan.

    </div>

</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
