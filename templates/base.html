{% load static %}
<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Darsliklar{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-hover: #5659e0;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --radius-lg: 16px;
        }

        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--bg-light);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 0.85rem 0;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .navbar-brand {
            gap: 10px;
            text-decoration: none;
        }

        .navbar-brand img {
            height: 36px;
            width: 36px;
            object-fit: contain;
            border-radius: 8px;
        }

        .navbar-brand span {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }

        /* ===== SEARCH BAR ===== */
        .search-form {
            position: relative;
            max-width: 420px;
            width: 100%;
        }

        .search-form input {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 40px 10px 16px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            height: 42px;
        }

        .search-form input:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgb(99 102 241 / 0.15);
            outline: none;
        }

        .search-form button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .search-form button:hover,
        .search-form button:focus {
            background: var(--bg-light);
            color: var(--primary);
        }

        /* ===== CREATE BUTTON ===== */
        .btn-create {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgb(99 102 241 / 0.25);
        }

        .btn-create:hover {
            background: linear-gradient(135deg, var(--primary-hover), var(--primary-dark));
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgb(99 102 241 / 0.35);
            color: #fff;
        }

        .btn-create:active {
            transform: translateY(0);
        }

        /* ===== CONTENT CARD ===== */
        .content-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }

        .content-card:hover {
            box-shadow: var(--shadow-md);
            transition: box-shadow 0.2s ease;
        }

        /* ===== FOOTER ===== */
        footer {
            background: #fff;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 16px 0;
            margin-top: auto;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 991px) {
            .navbar .container {
                flex-wrap: wrap;
                gap: 12px;
            }

            .search-form {
                order: 3;
                max-width: 100%;
                margin-top: 8px;
            }

            .btn-create {
                order: 2;
            }
        }

        @media (max-width: 576px) {
            .navbar-brand span {
                font-size: 1.1rem;
            }

            .search-form input {
                font-size: 0.9rem;
                padding: 9px 36px 9px 14px;
                height: 40px;
            }

            .btn-create {
                padding: 9px 16px;
                font-size: 0.9rem;
            }
        }

        /* ===== UTILS ===== */
        .text-muted {
            color: var(--text-muted) !important;
        }

        .fw-medium {
            font-weight: 500;
        }

        /* Smooth scroll for anchor links */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">

            <!-- LOGO -->
            <a class="navbar-brand d-flex align-items-center" href="{% url 'fanlar:fanlar_list' %}">
                <img src="https://i.ibb.co/DfBR13p7/logo.png" alt="Logo">
                <span>Darsliklar</span>
            </a>

            <!-- TOGGLER FOR MOBILE -->
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarContent" aria-controls="navbarContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- COLLAPSIBLE CONTENT -->
            <div class="collapse navbar-collapse" id="navbarContent">

                <!-- SEARCH -->
                <form class="search-form ms-lg-auto me-3 mb-2 mb-lg-0"
                      method="get" action="{% url 'fanlar:fanlar_list' %}">
                    <input type="search" name="search"
                           placeholder="Fan qidirish..."
                           value="{{ request.GET.search|default:'' }}"
                           aria-label="Qidiruv">
                    <button type="submit" aria-label="Qidirish">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </svg>
                    </button>
                </form>

                <!-- CREATE BUTTON -->
                <a href="{% url 'fanlar:fanlar_create' %}" class="btn-create">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                         viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    Qo'shish
                </a>

            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="container mt-4 flex-grow-1">
        {% block content %}
        <!-- Namuna card (o'chirib tashlashingiz mumkin) -->
        <div class="content-card">
            <h5 class="mb-3 fw-medium">Xush kelibsiz! 👋</h5>
            <p class="text-muted mb-0">Bu yerda fanlar ro'yxati va boshqa kontent joylashadi.</p>
        </div>
        {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="text-center">
        <div class="container">
            © 2026 Darsliklar platformasi. Barcha huquqlar himoyalangan.
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Optional: Focus fix for mobile search -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.querySelector('.search-form input');
            if (searchInput && window.innerWidth < 992) {
                searchInput.addEventListener('focus', function() {
                    this.scrollIntoView({ behavior: 'smooth', block: 'center' });
                });
            }
        });
    </script>

</body>
</html>
